{% extends 'base.html' %}
{% block title %}Confirmation{% endblock %}

{% block content %}
{% load static %}
<div class="search_results">
    <div class="container">
        <div class="confirmation-card">
            <div class="card confirm-card text-center">
                <div class="section-meta">
                    <span class="card-label">Booking Confirmed</span>
                </div>
                <p style="font-size: 3rem;">✈️</p>
                <h2>You're all booked!</h2>
                <p>Thank you, {{ user.first_name }}. Your flight has been successfully booked.</p>
                <hr>
                <a href="/" class="btn btn-primary mt-2">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
