{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Different Device Display / Accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=6.0, user-scalable=yes">

    <!-- Font family -->
    <link rel="stylesheet" href="https://use.typekit.net/oov2wcw.css">

    <!-- Code to CDN Bootstrap CSS Remote repository -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome - Webpage icons -->
    <script src="https://kit.fontawesome.com/f382cfac43.js" crossorigin="anonymous"></script>

    <!-- Your CSS style-sheet static location -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="{% static 'images/AirDBUK_Logo.webp' %}">

    <!-- Title block to be used across all templates -->
    <title>{% block title %}AirDBUK{% endblock %}</title>
</head>

<body>
    <!-- Nav Bar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand me-auto" href="/">AirDBUK</a>
            
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">AirDBUK</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" aria-current="page" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="{% url 'destinations' %}">Destinations</a>
                        </li>
                    </ul>
                </div>
            </div>
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="login-button">Dashbaord</a>
            {% else %}
            <a href="{% url 'login' %}" class="login-button">Login</a>
            {% endif %}
            <button class="navbar-toggler pe-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->

    <div class="">
        <main>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <!-- autocomplete script -->
    <script src="{% static 'js/autocomplete.js' %}"></script>
    <script src="{% static 'js/passenger_input.js' %}"></script>
    <script src="{% static 'js/fillSearch.js' %}"></script>
    <script src="{% static 'js/destinations.js' %}"></script>
    
    <script>window.HOME_URL = "{% url 'home' %}";</script>

</body>

</html>
