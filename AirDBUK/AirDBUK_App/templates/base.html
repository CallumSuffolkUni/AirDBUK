{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Different Device Display / Accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=6.0, user-scalable=yes">

    <!-- Your CSS style-sheet static location -->
    <link rel="stylesheet" href="{% static 'CSS/styleSheet.css' %}"/>

    <!-- Font family -->
    <link rel="stylesheet" href="https://use.typekit.net/oov2wcw.css">

    <!-- Code to CDN Bootstrap CSS Remote repository -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome - Webpage icons -->
    <script src="https://kit.fontawesome.com/f382cfac43.js" crossorigin="anonymous"></script>

    <!-- Title block to be used across all templates -->
    <title>{% block title %}AirDBUK{% endblock %}</title>
</head>
<body>
    <!-- Nav Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container-fluid px-4">
            <!-- Logo -->
            <a class="navbar-brand" href="/" style="margin-right: 40px;">
                <img src="{% static 'images/AirDBUK_Logo.png' %}" alt="AirDBUK Logo" style="max-height: 75px; width: auto;">
            </a>

            <!-- Hamburger Toggle for Mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Items -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active fw-1000" href="/">Book</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/">Destinations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Info</a>
                    </li>
                </ul>
            </div>
            <div class="">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-primary" href="/login" role="button">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- End of Nav Bar-->

    <!-- Main Content -->

    <div class="main_body col p-4">
        <div class="container-fluid">
            <main>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <!-- autocomplete script -->
    <script src="{% static 'js/autocomplete.js' %}"></script>
</body>
</html>
