{% extends "base.html" %}
    
{% block title %}Dashboard{% endblock %}

{% block content %}
{% if user.is_authenticated %}
<div class="container-fluid ">
    
    <div class="confirm-grid">

        <!-- Left: Passenger Details -->
        <div class="confirm-left">

            

        </div>

        <!-- Right: summary -->
        <div class="confirm-right">
            <div class="card confirm-card">
                <div class="section-meta">
                    <span class="card-label">Account Details</span>
                </div>

                <div class="route-row">
                    <div class="airport-block">
                        <div class="row">
                            <div class="col col-lg-2">{{ user.first_name }}</div>
                            <div class="col col-lg-2">{{ user.last_name }}</div>
                        <div class="flight-time">DOB</div>
                    </div>
                    <div class="airport-block text-end">
                        <a type="submit" class="btn btn-secondary" href="{% url 'logout' %}">Logout</a>
                    </div>
                </div>

                <hr>
            </div>
        </div>

    </div>

</div> 
{% endif %}

{% endblock %}
