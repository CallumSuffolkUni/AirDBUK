{% extends "base.html" %}
    
{% block title %}Login{% endblock %}

{% block content %}
{% load static %}
<div class="login-page">
    <div class="container">
        <div class="shadow p-4 mb-5 bg-body rounded w-100 w-sm-75 w-md-50" style="max-width: 560px;">
            <h1>Login</h1>
            
            <form method="POST" action="">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="login-button">Submit</button>
            </form>

            <p class="text-center">Not a registered user? Register <a href="{% url 'register_user' %}">here!</a></p>
        </div>
    </div> 
</div>

{% endblock %}
